name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  ci-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run CI gate
        run: make ci-gate
