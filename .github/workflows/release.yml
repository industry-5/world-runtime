name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v prefix)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(cat VERSION)"
          fi
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Run release gate
        run: make m25-validate

      - name: Build release artifacts
        run: make RELEASE_VERSION=${{ steps.version.outputs.value }} release-artifacts

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: world-runtime-v${{ steps.version.outputs.value }}
          path: |
            dist/releases/v${{ steps.version.outputs.value }}
            dist/releases/v${{ steps.version.outputs.value }}.tar.gz

      - name: Publish GitHub release (tag events only)
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/releases/v${{ steps.version.outputs.value }}.tar.gz
