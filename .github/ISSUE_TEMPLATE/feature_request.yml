name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - feature-request
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea.

        Public support is best-effort, and maintainers may decline requests that do not fit roadmap, support capacity, or release posture.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternatives have you tried?
