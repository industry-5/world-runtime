name: Bug report
description: Report a reproducible defect in world-runtime
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Public support for this repository is best-effort. Please do not use this template for active security vulnerabilities; use the process in `SECURITY.md` instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the smallest steps needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Call ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release tag, `VERSION`, or commit SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and anything else relevant
